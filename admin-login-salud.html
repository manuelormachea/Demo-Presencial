<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Acceso Admin — Numia Salud</title>
  <link rel="icon" type="image/png" href="images/N.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --numia-azul: #863DFF; --numia-azul-oscuro: #060A27; }
    body {
      font-family: 'Roboto', Arial, sans-serif; min-height: 100vh; margin: 0;
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .login-card { width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); overflow: hidden; background: #fff; }
    .login-head { background: var(--numia-azul-oscuro); color: #fff; padding: 1.5rem 1.75rem; text-align: center; }
    .login-head img { height: 32px; object-fit: contain; margin-bottom: 0.5rem; }
    .badge-admin { background: #863DFF22; color: #863DFF; border: 1px solid #863DFF55; border-radius: 20px; padding: 2px 12px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; display: inline-block; margin-top: 0.4rem; }
    .btn-entrar { background: var(--numia-azul); border: none; font-weight: 600; padding: 0.65rem 1.5rem; }
    .btn-entrar:hover { background: #6b2ecc; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-head">
      <img src="images/numia.png" alt="Numia" />
      <div class="fw-semibold mt-1">Panel de registros — Salud</div>
      <span class="badge-admin">Solo administradores</span>
    </div>
    <div class="p-4">
      <form id="formAdmin" autocomplete="on" novalidate>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input type="email" class="form-control form-control-lg" id="email" required autocomplete="username" />
        </div>
        <div class="mb-3">
          <label class="form-label" for="pwd">Contraseña</label>
          <input type="password" class="form-control form-control-lg" id="pwd" required autocomplete="current-password" />
        </div>
        <div class="alert alert-danger py-2 small d-none" id="err" role="alert"></div>
        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-primary btn-entrar text-white">
            <i class="bi bi-shield-lock me-2"></i>Ingresar
          </button>
        </div>
      </form>
    </div>
  </div>
  <script src="auth-portal-salud.js"></script>
  <script>
    (function () {
      if (AuthPortal.isAdminAuthenticated()) { window.location.replace('admin-salud.html'); return; }
      document.getElementById('formAdmin').addEventListener('submit', function (e) {
        e.preventDefault();
        var email = (document.getElementById('email').value || '').trim();
        var pwd   = (document.getElementById('pwd').value || '').trim();
        var err   = document.getElementById('err');
        err.classList.add('d-none');
        if (AuthPortal.adminLogin(email, pwd)) { window.location.replace('admin-salud.html'); }
        else { err.textContent = 'Credenciales incorrectas.'; err.classList.remove('d-none'); }
      });
    })();
  </script>
</body>
</html>
